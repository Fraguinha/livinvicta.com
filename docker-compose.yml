services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./data:/data/db

  backend:
    image: fraguinha/livinvicta.com-backend:latest
    environment:
      - DATABASE=mongodb://mongo:27017/livinvicta
      - NODE_ENV
      - SECRET
    depends_on:
      - mongo

  frontend:
    image: fraguinha/livinvicta.com-frontend:latest
    depends_on:
      - backend

  proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
